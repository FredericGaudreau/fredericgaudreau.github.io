<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer-when-downgrade" />
    <meta
      name="description"
      content="Carte interactive avec météo et informations géographiques."
    />
    <title>Carte Interactive</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #2563eb;
        --primary-dark: #1e40af;
        --error: #ef4444;
        --border: #e2e8f0;
        --text-primary: #0f172a;
        --text-secondary: #64748b;
        --bg-glass: rgba(255, 255, 255, 0.95);
        --shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
        --radius: 12px;
        --radius-lg: 20px;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      body {
        font-family: "Outfit", sans-serif;
        color: var(--text-primary);
        height: 100vh;
        overflow: hidden;
      }

      #map {
        position: fixed;
        inset: 0;
      }

      /* Formulaire d'ajout */
      #data-form {
        position: fixed;
        left: 50%;
        bottom: 1.5rem;
        transform: translateX(-50%);
        z-index: 1001;
        display: flex;
        gap: 0.75rem;
        align-items: center;
        background: var(--bg-glass);
        padding: 1rem 1.25rem;
        border-radius: 16px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
        border: 2px solid var(--border);
        max-width: min(90%, 600px);
        opacity: 0;
        pointer-events: none;
        transition: var(--transition);
      }

      #data-form.visible {
        opacity: 1;
        pointer-events: auto;
      }

      #data-form label {
        font-weight: 600;
        white-space: nowrap;
      }

      #data-form input {
        flex: 1;
        min-width: 150px;
        padding: 0.65rem 1rem;
        border: 2px solid var(--border);
        border-radius: 10px;
        font: inherit;
        transition: var(--transition);
      }

      #data-form select {
        flex: 1;
        min-width: 150px;
        padding: 0.65rem 1rem;
        border: 2px solid var(--border);
        border-radius: 10px;
        font: inherit;
        background: white;
        cursor: pointer;
        transition: var(--transition);
      }

      #data-form select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      #data-form input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      #add {
        padding: 0.65rem 1.5rem;
        border: 0;
        background: var(--primary);
        color: white;
        border-radius: 10px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        white-space: nowrap;
      }

      #add:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
      }

      #close-form {
        background: none;
        border: 0;
        font-size: 1.5rem;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 0 0.5rem;
        transition: var(--transition);
        line-height: 1;
      }

      #close-form:hover {
        color: var(--error);
        transform: rotate(90deg);
      }

      /* Section des points */
      #points-section {
        position: fixed;
        right: 1.25rem;
        top: 1.25rem;
        width: 420px;
        max-width: calc(100vw - 2.5rem);
        max-height: calc(100vh - 2.5rem);
        overflow-y: auto;
        background: var(--bg-glass);
        border: 2px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
        z-index: 1000;
        display: none;
        scrollbar-width: thin;
        /* scrollbar-color: var(--primary) var(--border); */
      }

      #points-section::-webkit-scrollbar {
        width: 8px;
      }

      #points-section::-webkit-scrollbar-track {
        background: var(--border);
        border-radius: var(--radius-lg);
      }

      #points-section::-webkit-scrollbar-thumb {
        background: var(--primary);
        border-radius: 4px;
      }

      #points-section h3 {
        position: sticky;
        top: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem;
        font-size: 1.3rem;
        border-bottom: 2px solid var(--border);
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        border-radius: 18px 18px 0 0;
        z-index: 1;
      }

      #close-points {
        background: none;
        border: 0;
        font-size: 1.5rem;
        color: var(--text-secondary);
        cursor: pointer;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        transition: var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #close-points:hover {
        background: rgba(239, 68, 68, 0.1);
        color: var(--error);
      }

      #points-list {
        list-style: none;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .point-card {
        background: white;
        border: 2px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        transition: var(--transition);
      }

      .point-card:hover,
      .point-card.active {
        border-color: var(--primary);
        transform: translateY(-2px);
        box-shadow: var(--shadow-sm);
      }

      .point-header {
        padding: 0.5rem;
        background: linear-gradient(135deg, #f8fafc 0%, white 100%);
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 0.75rem;
      }

      .point-title {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
        cursor: pointer;
        transition: color 0.3s;
        word-break: break-word;
      }

      .point-title:hover {
        color: var(--primary-dark);
        text-decoration: underline;
      }

      .point-coords {
        font-size: 0.55rem;
        color: var(--text-secondary);
        margin-top: 0.05rem;
        font-family: monospace;
      }

      .delete-btn {
        background: var(--error);
        color: white;
        border: 0;
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        white-space: nowrap;
      }

      .delete-btn:hover {
        background: #dc2626;
        transform: scale(1.05);
      }

      .point-info {
        padding: 1rem;
      }

      .tabs {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
        border-bottom: 2px solid var(--border);
        padding-bottom: 0.5rem;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .tabs::-webkit-scrollbar {
        display: none;
      }

      .tab {
        background: none;
        border: none;
        padding: 0.5rem 0.75rem;
        font: inherit;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-secondary);
        border-radius: 8px;
        cursor: pointer;
        transition: var(--transition);
        position: relative;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .tab:hover {
        background: rgba(37, 99, 235, 0.1);
        color: var(--primary);
      }

      .tab.active {
        color: var(--primary);
        background: rgba(37, 99, 235, 0.1);
      }

      .tab.active::after {
        content: "";
        position: absolute;
        bottom: -0.6rem;
        left: 0;
        right: 0;
        height: 3px;
        background: var(--primary);
        border-radius: 2px;
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
        animation: fadeIn 0.3s;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .info-item {
        margin-bottom: 0.25rem;
        font-size: 0.9rem;
        line-height: 1.5;
        word-break: break-word;
      }

      .info-item i {
        color: var(--primary);
        margin-right: 0.5rem;
        width: 20px;
        display: inline-block;
      }

      .info-item strong {
        font-weight: 600;
      }

      .weather-badge,
      .air-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 20px;
        font-weight: 600;
        margin-bottom: 0.75rem;
        font-size: 0.95rem;
      }

      .loading {
        text-align: center;
        padding: 1rem;
        color: var(--text-secondary);
      }

      .loading i {
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }

      .error-msg {
        color: var(--error);
        font-size: 0.85rem;
        padding: 0.5rem;
        background: rgba(239, 68, 68, 0.1);
        border-radius: 6px;
        text-align: center;
      }

      .leaflet-popup-content-wrapper {
        border-radius: 14px;
        border: 2px solid var(--border);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      }

      .leaflet-popup-content {
        font-family: "Outfit", sans-serif;
        font-size: 0.84rem;
        color: var(--text-primary);
        line-height: 1.35;
        max-width: 220px;
        padding: 0.75rem 0.8rem;
      }

      .leaflet-popup-close-button {
        display: none;
      }

      .popup-card {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }

      .popup-title {
        font-weight: 700;
        color: var(--primary);
        font-size: 0.95rem;
        margin-bottom: 0.2rem;
      }

      /* Boutons flottants */
      #footer {
        position: fixed;
        bottom: 1rem;
        left: 1rem;
        z-index: 999;
        display: flex;
        gap: 0.75rem;
      }

      .round-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        border: none;
        border-radius: 50%;
        color: white;
        font-weight: 700;
        font-size: 1.2rem;
        cursor: pointer;
        transition: var(--transition);
        box-shadow: var(--shadow-sm);
      }

      #collections-toggle {
        background: var(--primary);
      }

      #collections-toggle:hover,
      #toggle-points:hover {
        transform: scale(1.1);
        background-color: var(--primary-dark);
      }

      #about-link {
        background: var(--bg-glass);
        border: 2px solid var(--border);
        color: var(--text-primary);
        text-decoration: none;
        backdrop-filter: blur(12px);
      }

      #about-link:hover {
        background: var(--primary);
        color: white;
        /* transform: scale(1.15) rotate(15deg); */
      }

      #locate-btn {
        background: var(--primary);
      }

      #locate-btn:hover {
        background: var(--primary-dark);
        transform: scale(1.1);
      }

      #toggle-points {
        position: fixed;
        right: 1.25rem;
        top: 1.25rem;
        z-index: 1001;
        background: var(--primary);
        display: none;
      }

      #toggle-points:hover {
        transform: scale(1.1);
      }

      /* Toast notifications */
      #toast-container {
        position: fixed;
        top: 1.5rem;
        right: 1.5rem;
        z-index: 1005;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        max-width: 400px;
        pointer-events: none;
      }

      .toast {
        background: white;
        border-left: 4px solid var(--primary);
        border-radius: 8px;
        padding: 1rem 1.25rem;
        box-shadow: var(--shadow);
        display: flex;
        align-items: center;
        gap: 0.75rem;
        animation: slideIn 0.3s ease-out;
        pointer-events: auto;
        font-size: 0.95rem;
      }

      .toast.success {
        border-left-color: #10b981;
      }

      .toast.success i {
        color: #10b981;
      }

      .toast.error {
        border-left-color: var(--error);
      }

      .toast.error i {
        color: var(--error);
      }

      @keyframes slideIn {
        from {
          transform: translateX(400px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes slideOut {
        from {
          transform: translateX(0);
          opacity: 1;
        }
        to {
          transform: translateX(400px);
          opacity: 0;
        }
      }

      .toast.remove {
        animation: slideOut 0.3s ease-out forwards;
      }

      /* Search input */
      #search-wrapper {
        position: relative;
        padding: 1rem 1rem 0 1rem;
      }

      #search-points {
        width: 100%;
        padding: 0.65rem 2.5rem 0.65rem 1rem;
        border: 2px solid var(--border);
        border-radius: 10px;
        font: inherit;
        transition: var(--transition);
        box-sizing: border-box;
      }

      #search-points:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      #clear-search {
        position: absolute;
        right: 1.5rem;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        font-size: 1.25rem;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 0.25rem 0.5rem;
        margin-top: 0.5rem;
        transition: var(--transition);
        display: none;
        line-height: 1;
      }

      #clear-search:hover {
        color: var(--error);
        transform: translateY(-50%) scale(1.15);
      }

      #search-points:not(:placeholder-shown) ~ #clear-search {
        display: block;
      }

      .point-card.hidden {
        display: none;
      }

      /* Collections */
      #collections-manager {
        position: fixed;
        left: 1rem;
        bottom: 4.5rem;
        z-index: 999;
      }

      #collections-dropdown {
        position: absolute;
        bottom: 100%;
        left: 0;
        background: white;
        border: 2px solid var(--border);
        border-radius: 12px;
        box-shadow: var(--shadow);
        min-width: 250px;
        z-index: 999;
        margin-bottom: 0.75rem;
        overflow: hidden;
      }

      .collection-btn {
        width: 100%;
        padding: 0.75rem 1rem;
        border: none;
        background: none;
        text-align: left;
        font: inherit;
        font-size: 0.95rem;
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        gap: 0.5rem;
        border-bottom: 1px solid var(--border);
      }

      .collection-btn:hover {
        background: rgba(37, 99, 235, 0.08);
        color: var(--primary);
      }

      .collection-btn.active {
        background: rgba(37, 99, 235, 0.15);
        color: var(--primary);
        font-weight: 600;
      }

      .collection-btn.active::before {
        content: "✓";
        color: var(--primary);
        font-weight: 700;
      }

      .collection-badge {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        margin-right: 0.5rem;
        flex-shrink: 0;
      }

      .card-collection-select {
        width: auto;
        padding: 0.25rem 0.5rem;
        border: 1px solid var(--border);
        border-radius: 10px;
        font: inherit;
        color: var(--text-primary);
        background: #f8fafc;
        transition: var(--transition);
      }

      .card-collection-select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      .card-collection-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #f8fafc;
        color: var(--text-secondary);
        font-size: 0.9rem;
        cursor: pointer;
        transition: var(--transition);
        margin-top: 0.5rem;
        position: relative;
      }

      .card-collection-btn:hover {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
        transform: scale(1.05);
      }

      .card-collection-btn.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
      }

      .card-collection-dropdown {
        position: absolute;
        top: 100%;
        left: 0;
        background: white;
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: var(--shadow);
        min-width: 180px;
        z-index: 1000;
        display: none;
        margin-top: 0.25rem;
        max-height: 200px;
        overflow-y: auto;
      }

      .card-collection-option {
        width: 100%;
        padding: 0.5rem 0.75rem;
        border: none;
        background: none;
        text-align: left;
        font: inherit;
        font-size: 0.85rem;
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        gap: 0.5rem;
        border-bottom: 1px solid var(--border);
      }

      .card-collection-option:last-child {
        border-bottom: none;
      }

      .card-collection-option:hover {
        background: rgba(37, 99, 235, 0.08);
        color: var(--primary);
      }

      .card-collection-option.selected {
        background: rgba(37, 99, 235, 0.15);
        color: var(--primary);
        font-weight: 600;
      }

      .card-collection-option.selected::before {
        content: "✓";
        color: var(--primary);
        font-weight: 700;
      }

      .collection-option-badge {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .card-collection-label {
        font-size: 0.82rem;
        color: var(--text-secondary);
        margin-top: 0.5rem;
      }

      .point-card {
        border-left: 4px solid var(--border);
      }

      .point-card[data-collection] {
        border-left-color: var(--collection-color, var(--primary));
      }

      /* Modal */
      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        animation: fadeIn 0.2s;
      }

      .modal-content {
        background: white;
        border-radius: 16px;
        padding: 2rem;
        max-width: 400px;
        width: 90%;
        box-shadow: var(--shadow);
      }

      .modal-content h3 {
        margin-bottom: 1.5rem;
        font-size: 1.25rem;
        color: var(--primary);
      }

      .modal-content input {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 2px solid var(--border);
        border-radius: 10px;
        font: inherit;
        margin-bottom: 1.5rem;
        box-sizing: border-box;
      }

      .modal-content input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      .modal-buttons {
        display: flex;
        gap: 1rem;
        justify-content: flex-end;
      }

      .btn-primary,
      .btn-secondary {
        padding: 0.65rem 1.5rem;
        border: none;
        border-radius: 8px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .btn-primary:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
      }

      .btn-secondary {
        background: var(--border);
        color: var(--text-primary);
      }

      .btn-secondary:hover {
        background: #d4d4d8;
      }

      .collection-delete {
        background: none;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 0.25rem 0.5rem;
        font-size: 0.9rem;
        transition: var(--transition);
      }

      .collection-delete:hover {
        color: var(--error);
      }

      /* Badge de compteur */
      .counter-badge {
        position: absolute;
        top: -5px;
        right: -5px;
        background: var(--error);
        color: white;
        font-size: 0.7rem;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 10px;
        min-width: 18px;
        text-align: center;
      }

      /* Responsive */
      @media (max-width: 768px) {
        #points-section {
          width: calc(100% - 2rem);
          right: 1rem;
          left: 1rem;
          max-height: 70vh;
        }

        #data-form {
          flex-wrap: wrap;
          padding: 0.75rem;
          gap: 0.5rem;
        }

        #data-form label {
          width: 100%;
        }

        #data-form input,
        #data-form select {
          min-width: 0;
        }

        .round-btn {
          width: 40px;
          height: 40px;
        }

        #footer {
          gap: 0.5rem;
        }

        #collections-dropdown {
          max-width: calc(100vw - 3rem);
        }

        .modal-content {
          padding: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <!-- Formulaire d'ajout -->
    <form id="data-form">
      <label for="point-name">📍 Nom :</label>
      <input
        type="text"
        id="point-name"
        placeholder="Nom du point"
        required
        autocomplete="off"
      />
      <select id="collection-select">
        <option value="">--</option>
      </select>
      <button type="submit" id="add">Ajouter</button>
      <button type="button" id="close-form" aria-label="Fermer">×</button>
    </form>

    <!-- Gestion des collections -->
    <div id="collections-manager">
      <button
        id="collections-toggle"
        class="round-btn"
        title="Gérer les collections"
        aria-label="Gérer les collections"
      >
        <i class="fas fa-folder"></i>
      </button>
      <div id="collections-dropdown" style="display: none">
        <button id="new-collection-btn" class="collection-btn">
          <i class="fas fa-plus"></i> Nouvelle collection
        </button>
        <div id="collections-list"></div>
      </div>
    </div>

    <!-- Modal pour créer une collection -->
    <div id="collection-modal" class="modal" style="display: none">
      <div class="modal-content">
        <h3>Nouvelle collection</h3>
        <input
          type="text"
          id="collection-name-input"
          placeholder="Nom de la collection"
          autocomplete="off"
        />
        <div class="modal-buttons">
          <button id="modal-cancel" class="btn-secondary">Annuler</button>
          <button id="modal-create" class="btn-primary">Créer</button>
        </div>
      </div>
    </div>

    <!-- Section des points -->
    <section id="points-section">
      <h3>
        Points
        <button id="close-points" aria-label="Fermer">×</button>
      </h3>
      <div id="search-wrapper">
        <input
          type="text"
          id="search-points"
          placeholder="🔍 Rechercher un point..."
          autocomplete="off"
        />
        <button
          type="button"
          id="clear-search"
          aria-label="Effacer la recherche"
          title="Effacer"
        >
          ×
        </button>
      </div>
      <ul id="points-list"></ul>
    </section>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- Boutons flottants -->
    <div id="footer">
      <a
        href="https://FredericGaudreau.github.io/carte.html"
        id="about-link"
        class="round-btn"
        title="À propos"
        target="_blank"
        rel="noopener"
        >?</a
      >
      <button
        id="locate-btn"
        class="round-btn"
        title="Me localiser"
        aria-label="Me localiser"
      >
        <i class="fas fa-location-arrow"></i>
      </button>
    </div>

    <button
      id="toggle-points"
      class="round-btn"
      aria-label="Afficher les points"
    >
      <i class="fas fa-list"></i>
      <span class="counter-badge" style="display: none">0</span>
    </button>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
      "use strict";

      const CONFIG = {
        defaultCenter: [45.8924, -74.1546],
        defaultZoom: 13,
        focusZoom: 14,
        storageKey: "mapPoints",
        collectionsKey: "mapCollections",
        cacheExpiry: 3600000, // 1 heure en ms
      };

      const map = L.map("map").setView(
        CONFIG.defaultCenter,
        CONFIG.defaultZoom,
      );
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors",
        maxZoom: 19,
      }).addTo(map);

      // Couches de carte
      const baseLayers = {
        Standard: L.tileLayer(
          "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
          { maxZoom: 19 },
        ),
        Relief: L.tileLayer(
          "https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png",
          { maxZoom: 17 },
        ),
        Satellite: L.tileLayer(
          "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
          { maxZoom: 19 },
        ),
      };
      L.control
        .layers(baseLayers, null, { position: "bottomright" })
        .addTo(map);

      const points = [];
      let collections = [];
      let currentCollectionFilter = null;
      let previewMarker = null;
      const cache = new Map();

      const COLLECTION_COLORS = [
        "#3b82f6",
        "#ef4444",
        "#10b981",
        "#f59e0b",
        "#8b5cf6",
        "#ec4899",
        "#06b6d4",
        "#14b8a6",
        "#6366f1",
        "#f97316",
      ];

      const $ = (id) => document.getElementById(id);
      const form = $("data-form");
      const nameInput = $("point-name");
      const collectionSelect = $("collection-select");
      const pointsSection = $("points-section");
      const pointsList = $("points-list");
      const toggleBtn = $("toggle-points");
      const locateBtn = $("locate-btn");
      const counterBadge = toggleBtn.querySelector(".counter-badge");
      const searchInput = $("search-points");
      const toastContainer = $("toast-container");
      const collectionsToggle = $("collections-toggle");
      const collectionsDropdown = $("collections-dropdown");
      const newCollectionBtn = $("new-collection-btn");
      const collectionsList = $("collections-list");
      const collectionModal = $("collection-modal");
      const collectionNameInput = $("collection-name-input");
      const modalCreate = $("modal-create");
      const modalCancel = $("modal-cancel");

      const escapeHtml = (str) =>
        str.replace(
          /[&<>"']/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[c],
        );

      const debounce = (fn, delay) => {
        let timeout;
        return (...args) => {
          clearTimeout(timeout);
          timeout = setTimeout(() => fn(...args), delay);
        };
      };

      // Fonction pour afficher les notifications toast
      const showToast = (message, type = "success", duration = 3000) => {
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        const icon = type === "success" ? "check-circle" : "exclamation-circle";
        toast.innerHTML = `<i class="fas fa-${icon}"></i><span>${message}</span>`;
        toastContainer.appendChild(toast);

        setTimeout(() => {
          toast.classList.add("remove");
          setTimeout(() => toast.remove(), 300);
        }, duration);
      };

      // Fonction pour filtrer les points par recherche
      const filterPoints = () => {
        const query = searchInput.value.toLowerCase().trim();
        const cards = pointsList.querySelectorAll(".point-card");

        cards.forEach((card) => {
          const title = card
            .querySelector(".point-title")
            .textContent.toLowerCase();
          if (query === "" || title.includes(query)) {
            card.classList.remove("hidden");
          } else {
            card.classList.add("hidden");
          }
        });
      };

      function loadCollections() {
        try {
          const saved = localStorage.getItem(CONFIG.collectionsKey);
          collections = saved ? JSON.parse(saved) : [];
        } catch (error) {
          console.error("Erreur de chargement collections:", error);
          collections = [];
        }
      }

      function saveCollections() {
        try {
          localStorage.setItem(
            CONFIG.collectionsKey,
            JSON.stringify(collections),
          );
        } catch (error) {
          console.error("Erreur sauvegarde collections:", error);
          showToast("Erreur lors de la sauvegarde", "error");
        }
      }

      function createCollection(name) {
        if (!name.trim()) {
          showToast("Nom de collection requis", "error");
          return null;
        }
        const collection = {
          id: Date.now().toString(),
          name: name.trim(),
          color:
            COLLECTION_COLORS[collections.length % COLLECTION_COLORS.length],
        };
        collections.push(collection);
        saveCollections();
        updateCollectionsUI();
        updateCollectionSelect();
        showToast(`Collection "${name}" créée`, "success");
        return collection;
      }

      function deleteCollection(collectionId) {
        const collection = collections.find((c) => c.id === collectionId);
        if (!collection) return;

        // Retirer la collection des points
        points.forEach((p) => {
          if (p.collectionId === collectionId) {
            p.collectionId = null;
          }
        });

        collections = collections.filter((c) => c.id !== collectionId);
        saveCollections();
        savePoints();
        updateCollectionsUI();
        updateCollectionSelect();
        updatePointsList();
        showToast(`Collection "${collection.name}" supprimée`, "success");
      }

      function updateCollectionsUI() {
        collectionsList.innerHTML = "";

        if (collections.length === 0) {
          collectionsList.innerHTML =
            '<div style="padding: 0.5rem 1rem; color: var(--text-secondary); font-size: 0.9rem;">Aucune collection</div>';
          return;
        }

        collections.forEach((coll) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "collection-btn";
          if (currentCollectionFilter === coll.id) btn.classList.add("active");

          btn.innerHTML = `
            <span class="collection-badge" style="background: ${coll.color}"></span>
            <span>${escapeHtml(coll.name)}</span>
          `;

          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            currentCollectionFilter =
              currentCollectionFilter === coll.id ? null : coll.id;
            updatePointsList();
            updateCollectionsUI();
          });

          const deleteBtn = document.createElement("button");
          deleteBtn.type = "button";
          deleteBtn.className = "collection-delete";
          deleteBtn.innerHTML = '<i class="fas fa-trash"></i>';
          deleteBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            if (confirm(`Supprimer la collection "${coll.name}" ?`)) {
              deleteCollection(coll.id);
            }
          });

          const wrapper = document.createElement("div");
          wrapper.style.cssText =
            "display:flex; justify-content: space-between; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-bottom: 1px solid var(--border);";
          wrapper.appendChild(btn);
          wrapper.appendChild(deleteBtn);
          collectionsList.appendChild(wrapper);
        });
      }

      function updateCollectionSelect() {
        collectionSelect.innerHTML =
          '<option value="">--</option>';
        collections.forEach((coll) => {
          const opt = document.createElement("option");
          opt.value = coll.id;
          opt.textContent = coll.name;
          opt.style.borderLeft = `4px solid ${coll.color}`;
          collectionSelect.appendChild(opt);
        });
      }

      const formatCoords = (lat, lng) => `${lat.toFixed(5)}, ${lng.toFixed(5)}`;

      const formatDate = (dateStr) =>
        new Date(dateStr).toLocaleString("fr-FR", {
          hour: "2-digit",
          minute: "2-digit",
          day: "2-digit",
          month: "short",
        });

      const formatTime = (dateStr) =>
        new Date(dateStr).toLocaleTimeString("fr-FR", {
          hour: "2-digit",
          minute: "2-digit",
        });

      // Mise à jour du badge de compteur
      const updateCounter = () => {
        const count = points.length;
        if (count > 0) {
          counterBadge.textContent = count;
          counterBadge.style.display = "block";
        } else {
          counterBadge.style.display = "none";
        }
      };

      const WEATHER_CODES = {
        0: { text: "Ciel dégagé", emoji: "☀️" },
        1: { text: "Principalement ensoleillé", emoji: "🌤️" },
        2: { text: "Partiellement nuageux", emoji: "⛅" },
        3: { text: "Couvert", emoji: "☁️" },
        45: { text: "Brouillard", emoji: "🌫️" },
        48: { text: "Brouillard givrant", emoji: "🌫️" },
        51: { text: "Bruine légère", emoji: "🌦️" },
        53: { text: "Bruine modérée", emoji: "🌦️" },
        55: { text: "Bruine dense", emoji: "🌧️" },
        61: { text: "Pluie légère", emoji: "🌧️" },
        63: { text: "Pluie modérée", emoji: "🌧️" },
        65: { text: "Pluie forte", emoji: "⛈️" },
        71: { text: "Neige légère", emoji: "🌨️" },
        73: { text: "Neige modérée", emoji: "❄️" },
        75: { text: "Fortes chutes de neige", emoji: "❄️" },
        80: { text: "Averses légères", emoji: "🌦️" },
        81: { text: "Averses modérées", emoji: "🌧️" },
        82: { text: "Averses violentes", emoji: "⛈️" },
        95: { text: "Orages", emoji: "⛈️" },
        96: { text: "Orages avec grêle", emoji: "⛈️" },
        99: { text: "Orages violents", emoji: "⛈️" },
      };

      const getWeather = (code) =>
        WEATHER_CODES[code] || { text: "Inconnu", emoji: "🌍" };

      const AQI_LEVELS = [
        { max: 50, label: "Bon", emoji: "✅", color: "#10b981" },
        { max: 100, label: "Modéré", emoji: "⚠️", color: "#f59e0b" },
        { max: 150, label: "Sensible", emoji: "😷", color: "#f97316" },
        { max: 200, label: "Mauvais", emoji: "🚫", color: "#ef4444" },
        { max: 300, label: "Très mauvais", emoji: "☢️", color: "#b91c1c" },
        { max: Infinity, label: "Dangereux", emoji: "☠️", color: "#7f1d1d" },
      ];

      const getAQILevel = (aqi) => AQI_LEVELS.find((l) => aqi <= l.max);

      async function fetchData(url, cacheKey) {
        const cached = cache.get(cacheKey);
        if (cached && Date.now() - cached.timestamp < CONFIG.cacheExpiry) {
          return cached.data;
        }

        try {
          const response = await fetch(url);
          if (!response.ok) {
            // Ne pas logger les erreurs de service (5xx) qui sont hors de notre contrôle
            if (response.status >= 500) {
              return null;
            }
            throw new Error(`HTTP ${response.status}`);
          }
          const data = await response.json();
          cache.set(cacheKey, { data, timestamp: Date.now() });
          return data;
        } catch (error) {
          // Ne logger que les vraies erreurs (réseau, parsing), pas les erreurs de service
          if (error.message.includes("HTTP")) {
            console.warn(
              `Service indisponible (${cacheKey}): ${error.message}`,
            );
          } else {
            console.error(`Erreur API (${cacheKey}):`, error);
          }
          return null;
        }
      }

      const getWeatherData = (lat, lng) =>
        fetchData(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true&daily=sunrise,sunset&timezone=auto`,
          `weather_${lat}_${lng}`,
        );

      const getGeoData = (lat, lng) =>
        fetchData(
          `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,
          `geo_${lat}_${lng}`,
        );

      const getAirQualityData = (lat, lng) =>
        fetchData(
          `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lng}&current=us_aqi,pm10,pm2_5`,
          `air_${lat}_${lng}`,
        );

      const getElevationData = (lat, lng) =>
        fetchData(
          `https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lng}`,
          `elevation_${lat}_${lng}`,
        );

      function renderWeather(data) {
        if (!data?.current_weather) {
          return '<div class="error-msg">Données météo indisponibles</div>';
        }

        const w = data.current_weather;
        const weather = getWeather(w.weathercode);
        const sunrise = data.daily?.sunrise?.[0]
          ? formatTime(data.daily.sunrise[0])
          : "N/A";
        const sunset = data.daily?.sunset?.[0]
          ? formatTime(data.daily.sunset[0])
          : "N/A";

        return `
          <div class="weather-badge">${weather.emoji} ${w.temperature}°C</div>
          <div class="info-item">
            <i class="fas fa-cloud"></i>
            <strong>Conditions:</strong> ${weather.text}
          </div>
          <div class="info-item">
            <i class="fas fa-wind"></i>
            <strong>Vent:</strong> ${w.windspeed} km/h · ${Math.round(w.winddirection)}°
          </div>
          <div class="info-item">
            <i class="fas fa-sun"></i>
            <strong>Lever:</strong> ${sunrise} · <strong>Coucher:</strong> ${sunset}
          </div>
          <div class="info-item" style="font-size:0.75rem;color:var(--text-secondary);">
            <i class="fas fa-clock"></i>
            Mise à jour: ${formatDate(w.time)}
          </div>
        `;
      }

      function renderGeoInfo(geoData, elevationData) {
        if (!geoData?.address) {
          return '<div class="error-msg">Informations indisponibles</div>';
        }

        const addr = geoData.address;
        console.log("Données géographiques:", geoData);
        const elevation = elevationData?.results?.[0]?.elevation;

        const parts = [
          {
            icon: "map-marker-alt",
            label: "Adresse",
            value: geoData.display_name,
          },
          // { icon: "flag", label: "Pays", value: addr.country },
          // {
          //   icon: "city",
          //   label: "Ville",
          //   value: addr.city || addr.town || addr.village,
          // },
          // { icon: "envelope", label: "Code postal", value: addr.postcode },
          {
            icon: "mountain",
            label: "Altitude",
            value: elevation ? `${elevation.toFixed(1)} m` : null,
          },
        ];

        return parts
          .filter((p) => p.value)
          .map(
            (p) =>
              `<div class="info-item"><i class="fas fa-${p.icon}"></i><strong>${p.label}:</strong> ${escapeHtml(p.value)}</div>`,
          )
          .join("");
      }

      function formatPopupContent(
        point,
        weatherData = null,
        geoData = null,
        elevationData = null,
        airData = null,
      ) {
        const title = `📍 ${escapeHtml(point.name)}`;
        const coords = `${point.lat.toFixed(5)}, ${point.lng.toFixed(5)}`;

        const weather = weatherData?.current_weather
          ? getWeather(weatherData.current_weather.weathercode)
          : null;
        const temp = weatherData?.current_weather?.temperature;

        const city = geoData?.address
          ? geoData.address.city ||
            geoData.address.town ||
            geoData.address.village
          : null;
        const country = geoData?.address?.country;
        const postal = geoData?.address?.postcode;
        const elevation = elevationData?.results?.[0]?.elevation;

        const aqi = airData?.current?.us_aqi;
        const pm25 = airData?.current?.pm2_5;
        const pm10 = airData?.current?.pm10;
        let airHTML = "";

        if (aqi != null) {
          const level = getAQILevel(aqi);
          airHTML = `
            <div class="info-item"><strong>Air:</strong> ${Math.round(aqi)} – ${level.label}</div>
          `;
        }

        return `
          <div class="popup-card">
            <div class="popup-title">${title}</div>
            
            ${city || postal || country ? `<div class="info-item"><strong>Lieu:</strong> ${[city, postal, country].filter(Boolean).join(", ")}</div>` : ""}
            ${elevation != null ? `<div class="info-item"><strong>Alt:</strong> ${elevation.toFixed(1)} m</div>` : ""}
            ${weather ? `<div class="info-item"><strong>Météo:</strong> ${weather.emoji} ${weather.text} ${temp != null ? `(${temp}°C)` : ""}</div>` : ""}
            ${airHTML}
          </div>
        `;
      }

      function renderAirQuality(data) {
        if (!data?.current || data.current.us_aqi == null) {
          return '<div class="error-msg">Données qualité de l\'air indisponibles</div>';
        }

        const aqi = data.current.us_aqi;
        const pm25 = data.current.pm2_5;
        const pm10 = data.current.pm10;
        const level = getAQILevel(aqi);

        return `
          <div class="air-badge" style="background:${level.color};">
            ${level.emoji} AQI ${Math.round(aqi)} — ${level.label}
          </div>
          ${pm25 != null ? `<div class="info-item"><i class="fas fa-smog"></i><strong>PM2.5:</strong> ${pm25.toFixed(1)} µg/m³</div>` : ""}
          ${pm10 != null ? `<div class="info-item"><i class="fas fa-cloud"></i><strong>PM10:</strong> ${pm10.toFixed(1)} µg/m³</div>` : ""}
          <div class="info-item" style="font-size:0.75rem;color:var(--text-secondary);">
            <i class="fas fa-info-circle"></i>
            Index de qualité de l'air américain (US AQI)
          </div>
        `;
      }

      function renderCollectionOptions(selectedId = null) {
        return `
          <option value="">--</option>
          ${collections
            .map(
              (coll) =>
                `<option value="${coll.id}" ${coll.id === selectedId ? "selected" : ""}>${escapeHtml(coll.name)}</option>`,
            )
            .join("")}
        `;
      }

      function createPointCard(point, index) {
        const tabsId = `tabs_${index}`;
        return `
          <li class="point-card" data-index="${index}">
            <div class="point-header">
              <div style="flex:1;">
                <div class="point-title" data-index="${index}">${escapeHtml(point.name)}</div>
                <div class="point-coords">${formatCoords(point.lat, point.lng)}</div>
                </div>
                <select class="card-collection-select" data-index="${index}">
                  ${renderCollectionOptions(point.collectionId)}
                </select>
              <button class="delete-btn" data-index="${index}" aria-label="Supprimer ${escapeHtml(point.name)}">
                <i class="fas fa-trash"></i> 
              </button>
            </div>
            <div class="point-info">
              <div class="tabs">
                <button class="tab active" data-tab="info" data-id="${tabsId}">
                  <i class="fas fa-info-circle"></i> Infos
                </button>
                <button class="tab" data-tab="weather" data-id="${tabsId}">
                  <i class="fas fa-cloud-sun"></i> Météo
                </button>
                <button class="tab" data-tab="air" data-id="${tabsId}">
                  <i class="fas fa-wind"></i> Air
                </button>
              </div>
              <div class="tab-content active" data-content="info" data-id="${tabsId}">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>
              </div>
              <div class="tab-content" data-content="weather" data-id="${tabsId}">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>
              </div>
              <div class="tab-content" data-content="air" data-id="${tabsId}">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>
              </div>
            </div>
          </li>
        `;
      }

      async function loadPointData(point, tabsId) {
        const { lat, lng } = point;

        // Charger en parallèle pour améliorer la performance
        const [weatherData, geoData, elevationData, airData] =
          await Promise.all([
            getWeatherData(lat, lng),
            getGeoData(lat, lng),
            getElevationData(lat, lng),
            getAirQualityData(lat, lng),
          ]);

        const weatherEl = document.querySelector(
          `[data-content="weather"][data-id="${tabsId}"]`,
        );
        if (weatherEl) weatherEl.innerHTML = renderWeather(weatherData);

        const infoEl = document.querySelector(
          `[data-content="info"][data-id="${tabsId}"]`,
        );
        if (infoEl) infoEl.innerHTML = renderGeoInfo(geoData, elevationData);

        const airEl = document.querySelector(
          `[data-content="air"][data-id="${tabsId}"]`,
        );
        if (airEl) airEl.innerHTML = renderAirQuality(airData);

        if (point.marker) {
          point.marker.setPopupContent(
            formatPopupContent(
              point,
              weatherData,
              geoData,
              elevationData,
              airData,
            ),
          );
        }
      }

      function showPointCard(index) {
        if (pointsSection.style.display !== "block") {
          pointsSection.style.display = "block";
          toggleBtn.style.display = "none";
        }

        document
          .querySelectorAll(".point-card")
          .forEach((card) => card.classList.remove("active"));
        const card = pointsList.querySelector(
          `.point-card[data-index="${index}"]`,
        );
        if (card) {
          card.classList.add("active");
          card.scrollIntoView({ behavior: "smooth", block: "center" });
        }
      }

      function updatePointsList() {
        pointsList.innerHTML = "";

        if (points.length === 0) {
          pointsSection.style.display = "none";
          toggleBtn.style.display = "none";
          updateCounter();
          return;
        }

        if (pointsSection.style.display !== "block") {
          toggleBtn.style.display = "block";
        }

        // Filtrer par collection si nécessaire
        const filteredPoints = currentCollectionFilter
          ? points.filter((p) => p.collectionId === currentCollectionFilter)
          : points;

        // Utiliser DocumentFragment pour améliorer les performances
        const fragment = document.createDocumentFragment();
        const tempDiv = document.createElement("div");

        filteredPoints.forEach((point, index) => {
          const originalIndex = points.indexOf(point);
          tempDiv.innerHTML = createPointCard(point, originalIndex);
          const card = tempDiv.firstElementChild;
          if (point.collectionId) {
            const collection = collections.find(
              (c) => c.id === point.collectionId,
            );
            if (collection) {
              card.setAttribute("data-collection", point.collectionId);
              card.style.setProperty("--collection-color", collection.color);
            }
          }
          fragment.appendChild(card);
          loadPointData(point, `tabs_${originalIndex}`);
        });

        pointsList.appendChild(fragment);
        attachPointEvents();
        updateCounter();
      }

      function attachPointEvents() {
        // Événements pour les titres
        pointsList.querySelectorAll(".point-title").forEach((el) => {
          el.addEventListener("click", () => {
            const index = parseInt(el.dataset.index);
            const point = points[index];
            map.setView([point.lat, point.lng], CONFIG.focusZoom);
            point.marker.openPopup();
          });
        });

        // Événements pour les boutons de suppression
        pointsList.querySelectorAll(".delete-btn").forEach((el) => {
          el.addEventListener("click", () => {
            const index = parseInt(el.dataset.index);
            const pointName = points[index].name;
            const point = points[index];

            points[index].marker.remove();
            points.splice(index, 1);
            updatePointsList();
            savePoints();
            showToast(`"${pointName}" supprimé`, "success");
          });
        });

        // Événements pour les onglets
        pointsList.querySelectorAll(".tab").forEach((tab) => {
          tab.addEventListener("click", () => {
            const tabId = tab.dataset.id;
            const tabType = tab.dataset.tab;

            document
              .querySelectorAll(`[data-id="${tabId}"]`)
              .forEach((el) => el.classList.remove("active"));
            tab.classList.add("active");
            document
              .querySelector(`[data-content="${tabType}"][data-id="${tabId}"]`)
              .classList.add("active");
          });
        });

        // Événements pour modifier la collection d'un point
        pointsList
          .querySelectorAll(".card-collection-select")
          .forEach((select) => {
            select.addEventListener("change", () => {
              const index = parseInt(select.dataset.index);
              const point = points[index];
              point.collectionId = select.value || null;
              savePoints();
              updatePointsList();
              const collection = collections.find(
                (c) => c.id === point.collectionId,
              );
              showToast(
                collection
                  ? `Point "${point.name}" déplacé vers ${collection.name}`
                  : `Collection retirée pour "${point.name}"`,
                "success",
              );
            });
          });
      }

      function savePoints() {
        try {
          localStorage.setItem(
            CONFIG.storageKey,
            JSON.stringify(
              points.map(({ name, lat, lng, collectionId }) => ({
                name,
                lat,
                lng,
                collectionId: collectionId || null,
              })),
            ),
          );
        } catch (error) {
          console.error("Erreur de sauvegarde:", error);
          showToast("Impossible de sauvegarder les points", "error");
        }
      }

      function loadPoints() {
        try {
          const saved = localStorage.getItem(CONFIG.storageKey);
          if (!saved) return;

          JSON.parse(saved).forEach((pt) => {
            const marker = createMarker(pt.lat, pt.lng, pt.name);
            points.push({ ...pt, marker });
          });
          updatePointsList();
        } catch (error) {
          console.error("Erreur de chargement:", error);
        }
      }

      function createMarker(lat, lng, name) {
        const popupPoint = { name, lat, lng };
        return L.marker([lat, lng])
          .addTo(map)
          .bindPopup(formatPopupContent(popupPoint))
          .on("click", () => {
            const index = points.findIndex(
              (p) => p.lat === lat && p.lng === lng,
            );
            if (index !== -1) showPointCard(index);
          });
      }

      // Event listener pour la recherche
      searchInput.addEventListener("input", debounce(filterPoints, 150));

      // Event listener pour effacer la recherche
      $("clear-search").addEventListener("click", () => {
        searchInput.value = "";
        filterPoints();
        searchInput.focus();
      });

      map.on("click", (e) => {
        const { lat, lng } = e.latlng;
        if (previewMarker) previewMarker.remove();

        previewMarker = L.marker([lat, lng]).addTo(map);
        form.classList.add("visible");
        nameInput.value = "";
        nameInput.placeholder = `Nom du point (${formatCoords(lat, lng)})`;
        nameInput.focus();
      });

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        if (!previewMarker) return;

        const name = nameInput.value.trim() || "Sans nom";
        const { lat, lng } = previewMarker.getLatLng();
        const collectionId = collectionSelect.value || null;
        const marker = createMarker(lat, lng, name);

        points.push({ name, lat, lng, marker, collectionId });
        previewMarker.remove();
        previewMarker = null;
        form.reset();
        collectionSelect.value = "";
        form.classList.remove("visible");
        updatePointsList();
        savePoints();
        showToast(`Point "${name}" ajouté`, "success");
      });

      $("close-form").addEventListener("click", () => {
        form.classList.remove("visible");
        if (previewMarker) {
          previewMarker.remove();
          previewMarker = null;
        }
      });

      $("close-points").addEventListener("click", () => {
        pointsSection.style.display = "none";
        toggleBtn.style.display = "block";
      });

      toggleBtn.addEventListener("click", () => {
        pointsSection.style.display = "block";
        toggleBtn.style.display = "none";
      });

      locateBtn.addEventListener("click", () => {
        if (!navigator.geolocation) {
          showToast("Géolocalisation non supportée", "error");
          return;
        }

        const originalHTML = locateBtn.innerHTML;
        locateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        locateBtn.disabled = true;

        navigator.geolocation.getCurrentPosition(
          (position) => {
            const { latitude, longitude } = position.coords;
            map.setView([latitude, longitude], 15);
            L.marker([latitude, longitude])
              .addTo(map)
              .bindPopup("📍 Vous êtes ici !")
              .openPopup();
            locateBtn.innerHTML = originalHTML;
            locateBtn.disabled = false;
            showToast("Position trouvée", "success");
          },
          (error) => {
            const messages = {
              1: "Permission refusée",
              2: "Position indisponible",
              3: "Délai d'attente dépassé",
            };
            showToast(
              `Erreur: ${messages[error.code] || error.message}`,
              "error",
            );
            locateBtn.innerHTML = originalHTML;
            locateBtn.disabled = false;
          },
          { timeout: 10000, enableHighAccuracy: true },
        );
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          if (form.classList.contains("visible")) {
            $("close-form").click();
          } else if (pointsSection.style.display === "block") {
            $("close-points").click();
          } else if (map._popup) {
            map.closePopup();
          }
        }
      });

      window.addEventListener(
        "resize",
        debounce(() => map.invalidateSize(), 250),
      );

      collectionsToggle.addEventListener("click", () => {
        collectionsDropdown.style.display =
          collectionsDropdown.style.display === "none" ? "block" : "none";
      });

      document.addEventListener("click", (e) => {
        if (
          !collectionsToggle.contains(e.target) &&
          !collectionsDropdown.contains(e.target)
        ) {
          collectionsDropdown.style.display = "none";
        }
      });

      newCollectionBtn.addEventListener("click", () => {
        collectionNameInput.value = "";
        collectionModal.style.display = "flex";
        collectionNameInput.focus();
        collectionsDropdown.style.display = "none";
      });

      modalCancel.addEventListener("click", () => {
        collectionModal.style.display = "none";
      });

      modalCreate.addEventListener("click", () => {
        const name = collectionNameInput.value.trim();
        if (name) {
          createCollection(name);
          collectionModal.style.display = "none";
        }
      });

      collectionNameInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          modalCreate.click();
        }
      });

      collectionModal.addEventListener("click", (e) => {
        if (e.target === collectionModal) {
          collectionModal.style.display = "none";
        }
      });

      document.addEventListener("DOMContentLoaded", () => {
        setTimeout(() => map.invalidateSize(), 100);
        loadCollections();
        updateCollectionsUI();
        updateCollectionSelect();
        loadPoints();
      });
    </script>
  </body>
</html>
